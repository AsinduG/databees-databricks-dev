# This is a Databricks asset bundle definition for demo_anaytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: demo_anaytics
  uuid: b70a1f9b-b216-4460-bae3-d81d338b8f21

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    # mode: development
    presets:
      name_prefix: dev_
    default: true
    workspace:
      host: https://dbc-8d4e3e1c-7cdc.cloud.databricks.com
    variables:
      catalog: dev
      schema: bronze
  prod:
    # mode: production
    presets:
      name_prefix: prod_
    workspace:
      host: https://dbc-8d4e3e1c-7cdc.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/pinky.promises1999@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/pinky.promises1999@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod
      schema: bronze
    permissions:
      - user_name: pinky.promises1999@gmail.com
        level: CAN_MANAGE
