# A sample job for demo_anaytics.

resources:
  jobs:
    taxi_analytics:
      name: taxi_analytics

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}


      tasks:
        - task_key: notebook_task
          notebook_task:
            notebook_path: ../src/sample_notebook
        - task_key: transactions
          depends_on:
            - task_key: notebook_task
          notebook_task:
            notebook_path: ../src/transactions

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
